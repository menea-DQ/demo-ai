# =============================================================================
#  Stack di produzione: app Next.js + Redis.
#  L'app è pubblicata SOLO su 127.0.0.1:3000 → raggiungibile esclusivamente dal
#  reverse proxy nginx installato sull'host (vedi deploy/nginx.conf).
#
#  Uso (dalla root del repo):
#    cp .env.example .env.production      # compila i valori di produzione
#    docker compose -f deploy/docker-compose.prod.yml up -d --build
#
#  In .env.production ricorder(ALMENO):
#    OPENROUTER_API_KEY=...
#    SESSION_SECRET=<openssl rand -hex 32>     # >=16 char, NON il default
#    REDIS_URL=redis://redis:6379              # nome del servizio qui sotto
#    NEXT_PUBLIC_TURNSTILE_SITE_KEY=...        # obbligatorie in prod
#    TURNSTILE_SECRET_KEY=...
#    NEXT_PUBLIC_APP_URL=https://aurora.example.com
# =============================================================================
services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    env_file: ../.env.production
    environment:
      - NODE_ENV=production
    # Pubblicato solo su localhost dell'host: nessun accesso diretto dall'esterno.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - aurora-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  aurora-redis-data:

# -----------------------------------------------------------------------------
#  Perché nginx NON è qui dentro?
#  In Docker, con le porte pubblicate sul bridge, nginx vedrebbe come IP sorgente
#  il gateway Docker (non il client reale) → il rate-limit per-IP diventerebbe inutile.
#  Quindi nginx va sull'HOST (vede l'IP vero) e fa proxy verso 127.0.0.1:3000.
#  In alternativa (solo Linux) si può usare un container nginx con
#  `network_mode: "host"` che fa proxy verso 127.0.0.1:3000 — vedi DEPLOY.md.
# -----------------------------------------------------------------------------
