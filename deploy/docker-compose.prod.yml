# =============================================================================
#  Stack di produzione (monorepo): app wiki + app finance + Redis condiviso.
#  Ogni app è pubblicata SOLO su 127.0.0.1 → raggiungibile solo dal reverse proxy
#  nginx installato sull'host (vedi deploy/nginx.conf).
#
#  Uso (dalla root del repo):
#    cp apps/wiki/.env.example    apps/wiki/.env.production
#    cp apps/finance/.env.example apps/finance/.env.production
#    # compila i valori (SESSION_SECRET forte, Turnstile, REDIS_URL=redis://redis:6379, APP_NAMESPACE)
#    docker compose -f deploy/docker-compose.prod.yml up -d --build
#
#  NB: in .env.production di ENTRAMBE le app -> REDIS_URL=redis://redis:6379
#      e APP_NAMESPACE distinti (wiki / finance) per la segregazione dei limiti.
# =============================================================================
services:
  wiki:
    build:
      context: ..
      dockerfile: apps/wiki/Dockerfile
    env_file: ../apps/wiki/.env.production
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  finance:
    build:
      context: ..
      dockerfile: apps/finance/Dockerfile
    env_file: ../apps/finance/.env.production
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - donq-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  donq-redis-data:

# -----------------------------------------------------------------------------
#  nginx NON è qui: in Docker (bridge + porte pubblicate) vedrebbe l'IP del gateway,
#  non del client → rate-limit per-IP inutile. Va sull'HOST e fa proxy verso
#  127.0.0.1:3000 (wiki) e 127.0.0.1:3001 (finance). Vedi deploy/nginx.conf.
# -----------------------------------------------------------------------------
