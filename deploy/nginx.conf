# =============================================================================
#  Reverse proxy nginx per le demo Donq (da installare SULL'HOST).
#  Scopo di sicurezza: SOVRASCRIVERE X-Forwarded-For con l'IP reale del client,
#  così il rate-limit per-IP delle app è affidabile e non falsificabile.
#
#  Una app per sottodominio; le app ascoltano solo su 127.0.0.1 (vedi compose).
#    wiki    -> 127.0.0.1:3000
#    finance -> 127.0.0.1:3001
#
#  Installazione:
#    sudo cp deploy/nginx.conf /etc/nginx/sites-available/donq
#    sudo ln -s /etc/nginx/sites-available/donq /etc/nginx/sites-enabled/donq
#    sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# blocco riusabile per gli header (DRY)
# (in nginx si ripete per server; qui sotto è esplicitato in ciascun location)

# ---------- WIKI ----------
server {
    listen 80;
    server_name wiki.example.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name wiki.example.com;
    ssl_certificate     /etc/letsencrypt/live/wiki.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;   # SOVRASCRIVE (no spoofing)
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;                                # streaming chat NDJSON
        proxy_read_timeout 300s;
    }
}

# ---------- FINANCE ----------
server {
    listen 80;
    server_name finance.example.com;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl http2;
    server_name finance.example.com;
    ssl_certificate     /etc/letsencrypt/live/finance.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finance.example.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}

# =============================================================================
#  VARIANTE con CDN davanti (es. Cloudflare): $remote_addr sarebbe l'IP della CDN.
#  Abilita ngx_http_realip_module e fidati solo degli IP della CDN:
#    set_real_ip_from 173.245.48.0/20;   # ... range Cloudflare (https://www.cloudflare.com/ips/)
#    real_ip_header CF-Connecting-IP;
#  Così $remote_addr torna a essere l'IP reale del client.
# =============================================================================
