# =============================================================================
#  Reverse proxy nginx per Aurora Wiki (da installare SULL'HOST).
#  Scopo di sicurezza: SOVRASCRIVERE X-Forwarded-For con l'IP reale del client,
#  così il rate-limit per-IP dell'app è affidabile e non falsificabile.
#
#  Installazione:
#    sudo cp deploy/nginx.conf /etc/nginx/sites-available/aurora
#    sudo ln -s /etc/nginx/sites-available/aurora /etc/nginx/sites-enabled/aurora
#    sudo nginx -t && sudo systemctl reload nginx
#
#  L'app deve ascoltare SOLO su 127.0.0.1:3000 (vedi deploy/docker-compose.prod.yml),
#  così nessuno può bypassare nginx e forgiare gli header.
# =============================================================================

# (Opzionale) redirect HTTP -> HTTPS
server {
    listen 80;
    server_name aurora.example.com;       # <-- il tuo dominio
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aurora.example.com;        # <-- il tuo dominio

    # TLS (es. Let's Encrypt / certbot)
    ssl_certificate     /etc/letsencrypt/live/aurora.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aurora.example.com/privkey.pem;

    # --- Se NON sei dietro una CDN ---
    # $remote_addr è l'IP reale del client. Sovrascriviamo (NON accodiamo) l'header.
    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $remote_addr;   # SOVRASCRIVE: scarta valori inviati dal client
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # La chat è in streaming (NDJSON): disattiva il buffering o i token arrivano in blocco.
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# =============================================================================
#  VARIANTE con CDN davanti (es. Cloudflare):
#  qui $remote_addr è l'IP della CDN, non del client. Abilita ngx_http_realip_module
#  e fidati SOLO degli IP della CDN, leggendo l'header con l'IP reale:
#
#    set_real_ip_from 173.245.48.0/20;   # ... tutti i range Cloudflare ...
#    set_real_ip_from 103.21.244.0/22;
#    # (lista completa: https://www.cloudflare.com/ips/)
#    real_ip_header CF-Connecting-IP;
#
#  Con questo, $remote_addr diventa l'IP vero del client e la config sopra resta valida.
# =============================================================================
